services:
  auth-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    tmpfs:
      - /var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@auth-db:5432/auth_db?sslmode=disable
      JWT_SECRET: supersecret123
      PORT: "8080"
    ports:
      - "8080:8080"

  project-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: project_db
    tmpfs:
      - /var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  project-service:
    build: ./project-service
    restart: unless-stopped
    depends_on:
      project-db:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@project-db:5432/project_db?sslmode=disable
      JWT_SECRET: supersecret123
      AUTH_SERVICE_URL: http://auth-service:8080
      PORT: "8081"
    ports:
      - "8081:8081"