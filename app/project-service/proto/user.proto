syntax = "proto3";

package dto;

option go_package = "project-service/internal/model/dto;dto";

message User {
  int32 id = 1;
  string email = 2;
  string name = 3;
  string surname = 4;
  // password is not included for security
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string name = 3;
  string surname = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  int32 user_id = 1;
}