<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 32px; background: #f4f6f8; }
    .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    h1 { margin-top: 0; }
    .section { margin-top: 24px; }
    .section-title { display: flex; justify-content: space-between; align-items: center; }
    .section-title h2 { margin: 0; }
    form { display: grid; gap: 12px; margin-top: 16px; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; }
    button { padding: 12px 18px; border: none; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .message { margin: 16px 0; padding: 12px; border-radius: 8px; }
    .message.error { background: #fee2e2; color: #991b1b; }
    .message.success { background: #dcfce7; color: #166534; }
    .grid { display: grid; gap: 18px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .card { padding: 16px; border: 1px solid #e2e8f0; border-radius: 12px; background: #fafbfc; }
    .card h3 { margin: 0 0 8px; }
    .empty-state { color: #475569; }
    .logout { margin-left: 12px; background: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <div class="section-title">
      <div>
        <h1>Мои проекты</h1>
        <p id="subtitle">Загрузка...</p>
      </div>
      <div>
        <button id="refresh-button">Обновить</button>
        <button id="logout-button" class="logout">Выйти</button>
      </div>
    </div>

    <div id="message" class="message" style="display:none"></div>

    <section class="section">
      <h2>Создать проект</h2>
      <form id="create-project-form">
        <input id="project-title" type="text" placeholder="Название проекта" required />
        <textarea id="project-description" rows="4" placeholder="Описание проекта" required></textarea>
        <button type="submit">Создать</button>
      </form>
    </section>

    <section class="section">
      <h2>Проекты, которые я веду</h2>
      <div id="owned-projects" class="grid"></div>
    </section>

    <section class="section">
      <h2>Проекты, в которых я участвую</h2>
      <div id="member-projects" class="grid"></div>
    </section>
  </div>

  <script>
    const storageKey = 'project_service_jwt';

    const showMessage = (text, isError = false) => {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = 'message ' + (isError ? 'error' : 'success');
      message.style.display = 'block';
    };

    const clearMessage = () => {
      const message = document.getElementById('message');
      message.textContent = '';
      message.style.display = 'none';
    };

    const getTokenFromQuery = () => {
      const params = new URLSearchParams(window.location.search);
      return params.get('token');
    };

    const token = () => window.localStorage.getItem(storageKey);
    const setToken = (value) => window.localStorage.setItem(storageKey, value);
    const clearToken = () => window.localStorage.removeItem(storageKey);

    const requireAuth = () => {
      const queryToken = getTokenFromQuery();
      if (queryToken) {
        setToken(queryToken);
        window.history.replaceState({}, document.title, window.location.pathname);
      }

      if (!token()) {
        document.getElementById('subtitle').textContent = 'Требуется вход через auth-service.';
        showMessage('Пожалуйста, войдите через auth-service: http://localhost:8080', true);
        return false;
      }

      return true;
    };

    const apiRequest = async (path, options = {}) => {
      if (!token()) {
        throw new Error('Токен не найден, требуется вход.');
      }

      const response = await fetch(path, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token(),
          ...options.headers,
        },
      });

      const text = await response.text();
      if (!response.ok) {
        throw new Error(text || 'Ошибка сервера');
      }

      return text ? JSON.parse(text) : null;
    };

    const renderProjects = (containerId, projects = []) => {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      projects = projects || [];

      if (projects.length === 0) {
        container.innerHTML = '<div class="empty-state">Пока нет проектов.</div>';
        return;
      }

      projects.forEach(project => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<h3>${project.name}</h3><p>${project.description}</p>`;
        card.addEventListener('click', () => {
          window.location.href = `/project/${project.id}`;
        });
        container.appendChild(card);
      });
    };

    const loadDashboard = async () => {
      clearMessage();
      document.getElementById('subtitle').textContent = 'Загрузка списка проектов...';

      try {
        const data = await apiRequest('/api/dashboard');
        renderProjects('owned-projects', data.owned_projects || []);
        renderProjects('member-projects', data.member_projects || []);
        document.getElementById('subtitle').textContent = 'Список проектов успешно загружен.';
      } catch (error) {
        showMessage(error.message, true);
        document.getElementById('subtitle').textContent = 'Не удалось загрузить проекты.';
      }
    };

    document.getElementById('create-project-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      clearMessage();

      try {
        const title = document.getElementById('project-title').value.trim();
        const description = document.getElementById('project-description').value.trim();

        if (!title || !description) {
          showMessage('Название и описание обязательны.', true);
          return;
        }

        await apiRequest('/api/projects', {
          method: 'POST',
          body: JSON.stringify({ name: title, description }),
        });

        document.getElementById('project-title').value = '';
        document.getElementById('project-description').value = '';
        showMessage('Проект создан. Обновите список.', false);
        loadDashboard();
      } catch (error) {
        showMessage(error.message, true);
      }
    });

    document.getElementById('refresh-button').addEventListener('click', () => {
      clearMessage();
      loadDashboard();
    });

    document.getElementById('logout-button').addEventListener('click', () => {
      clearToken();
      window.location.href = 'http://localhost:8080';
    });

    if (requireAuth()) {
      loadDashboard();
    }
  </script>
</body>
</html>
