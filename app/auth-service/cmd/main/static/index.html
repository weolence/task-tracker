<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth Service</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 32px; background: #f4f6f8; }
    .container { max-width: 520px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    h1 { margin-top: 0; }
    form { margin-bottom: 24px; }
    label { display: block; margin: 12px 0 4px; font-weight: 600; }
    input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; }
    button { margin-top: 16px; padding: 12px 18px; border: none; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .message { margin: 16px 0; padding: 12px; border-radius: 8px; }
    .message.error { background: #fee2e2; color: #991b1b; }
    .message.success { background: #dcfce7; color: #166534; }
    .token { word-break: break-all; background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Вход</h1>

    <section>
      <h2>Авторизация</h2>
      <form id="login-form">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" required />

        <label for="login-password">Пароль</label>
        <input id="login-password" type="password" required />

        <button type="submit">Войти</button>
      </form>
      <p style="margin-top: 12px; color: #555;">Регистрация производится администратором через командную строку приложения.</p>
    </section>

    <div id="message" class="message" style="display:none"></div>
    <div id="token" class="token" style="display:none"></div>
  </div>

  <script>
    const showMessage = (text, isError = false) => {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = 'message ' + (isError ? 'error' : 'success');
      message.style.display = 'block';
    };

    const clearMessage = () => {
      const message = document.getElementById('message');
      message.textContent = '';
      message.style.display = 'none';
    };

    const showToken = (token) => {
      const tokenBlock = document.getElementById('token');
      tokenBlock.textContent = token;
      tokenBlock.style.display = 'block';
    };

    const sendJson = async (url, payload) => {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || 'Ошибка сервера');
      }

      return response.json();
    };

    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      clearMessage();
      showToken('');

      try {
        const result = await sendJson('/login', {
          email: document.getElementById('login-email').value,
          password: document.getElementById('login-password').value,
        });
        showMessage('Вход выполнен успешно.', false);
        showToken(result.token);
      } catch (error) {
        showMessage(error.message, true);
      }
    });
  </script>
</body>
</html>
